name: Deploy to Azure Functions (Node.js)

on:
  workflow_call:
    inputs:
      node-version:
        type: string
        default: '20'
      build-command:
        type: string
        default: 'npm run build'
      app-name:
        required: false
        type: string
        default: ''
      package-path:
        type: string
        default: '.'
    secrets:
      azure-client-id:
        required: true
      azure-tenant-id:
        required: true
      azure-subscription-id:
        required: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Determine Function App Name
        id: get-app
        run: |
          if [ -n "${{ inputs.app-name }}" ]; then
            echo "name=${{ inputs.app-name }}" >> "$GITHUB_OUTPUT"
          else
            BRANCH="${{ github.ref_name }}"
            if [ "$BRANCH" = "develop" ]; then
              echo "name=func-msc-qcu-backend-dev" >> "$GITHUB_OUTPUT"
            elif [ "$BRANCH" = "release" ]; then
              echo "name=func-msc-qcu-backend-rel" >> "$GITHUB_OUTPUT"
            else
              echo "name=func-msc-qcu-backend" >> "$GITHUB_OUTPUT"
            fi
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}

      - name: Install dependencies
        run: npm install

      - name: Build project
        run: ${{ inputs.build-command }}

      - name: Generate Prisma Client
        run: |
          if grep -q "prisma" package.json; then
            npx prisma generate
          fi

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.azure-client-id }}
          tenant-id: ${{ secrets.azure-tenant-id }}
          subscription-id: ${{ secrets.azure-subscription-id }}

      - name: Run Database Migrations
        run: |
          if [ -d "prisma" ]; then
            echo "Fetching database URL from function app config..."
            APP_NAME="${{ steps.get-app.outputs.name }}"
            if [ "$APP_NAME" = "func-msc-qcu-backend-dev" ]; then
              KV_NAME="kv-msc-qcu-dev"
            elif [ "$APP_NAME" = "func-msc-qcu-backend-rel" ]; then
              KV_NAME="kv-msc-qcu-release"
            else
              KV_NAME="kv-msc-qcu-prod"
            fi
            echo "Fetching DATABASE_URL secret from Key Vault: $KV_NAME..."
            DATABASE_URL=$(az keyvault secret show --vault-name $KV_NAME --name database-url --query "value" -o tsv)
            if [ -n "$DATABASE_URL" ]; then
              export DATABASE_URL=$DATABASE_URL
              SERVER_NAME=$(echo $DATABASE_URL | sed -e 's|.*@||' -e 's|\..*||')
              RUNNER_IP=$(curl -s https://api.ipify.org)
              
              RULE_NAME="temp-gh-${{ github.run_id }}"
              echo "Adding temporary firewall rule on MySQL server: $SERVER_NAME for IP: $RUNNER_IP (Rule: $RULE_NAME)"
              az mysql flexible-server firewall-rule create \
                --resource-group MSC-QCU \
                --name $SERVER_NAME \
                --rule-name "$RULE_NAME" \
                --start-ip-address $RUNNER_IP \
                --end-ip-address $RUNNER_IP
              
              # Set trap for guaranteed cleanup
              trap 'echo "Cleaning up firewall rule..."; az mysql flexible-server firewall-rule delete --resource-group MSC-QCU --name $SERVER_NAME --rule-name "$RULE_NAME" --yes || true' EXIT
              
              echo "Running Prisma migrations..."
              npx prisma migrate deploy

              BRANCH_NAME="${{ github.ref_name }}"
              if [ "$BRANCH_NAME" = "develop" ] || [ "$BRANCH_NAME" = "release" ]; then
                echo "Running database seeding on branch $BRANCH_NAME..."
                
                # Fetch Better Auth secrets from Key Vault
                VAULT_SECRET=$(az keyvault secret show --vault-name $KV_NAME --name better-auth-secret --query "value" -o tsv || echo "")
                VAULT_URL=$(az keyvault secret show --vault-name $KV_NAME --name better-auth-url --query "value" -o tsv || echo "")
                VAULT_STORAGE_NAME=$(az keyvault secret show --vault-name $KV_NAME --name storage-account-name --query "value" -o tsv || echo "")
                VAULT_RESEND_API_KEY=$(az keyvault secret show --vault-name $KV_NAME --name resend-api-key --query "value" -o tsv || echo "")
                
                # Set dynamic URL defaults using GitHub Repository Variables
                if [ "$BRANCH_NAME" = "develop" ]; then
                  DEFAULT_URL="${{ vars.DEV_BETTER_AUTH_URL }}"
                  DEFAULT_STORAGE="stsamscqcubackenddev"
                elif [ "$BRANCH_NAME" = "release" ]; then
                  DEFAULT_URL="${{ vars.RELEASE_BETTER_AUTH_URL }}"
                  DEFAULT_STORAGE="stsamscqcubackendrel"
                else
                  DEFAULT_URL="${{ vars.PROD_BETTER_AUTH_URL }}"
                  DEFAULT_STORAGE="stsamscqcubackend"
                fi

                export BETTER_AUTH_SECRET=${VAULT_SECRET:-"temporary_github_actions_seed_secret_12345"}
                export BETTER_AUTH_URL=${VAULT_URL:-$DEFAULT_URL}
                export AZURE_STORAGE_ACCOUNT_NAME=${VAULT_STORAGE_NAME:-$DEFAULT_STORAGE}
                export RESEND_API_KEY=$VAULT_RESEND_API_KEY
                
                npx prisma db seed
              else
                echo "Skipping database seeding on branch: $BRANCH_NAME"
              fi
            else
              echo "DATABASE_URL setting not found in function app."
            fi
          else
            echo "Prisma directory not found, skipping migrations."
          fi

      - name: Prune dev dependencies before deployment
        run: |
          npm prune --omit=dev
          if grep -q "prisma" package.json; then
            npx prisma generate
          fi

      - name: Remove local settings before deployment
        run: rm -f local.settings.json

      - name: Deploy to Azure Functions
        uses: Azure/functions-action@v1
        with:
          app-name: ${{ steps.get-app.outputs.name }}
          package: ${{ inputs.package-path }}
          respect-funcignore: true
